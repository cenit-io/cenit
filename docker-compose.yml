volumes:
  mongodb-data-7: {}
  redis-data: {}
  ui-node-modules: {}

services:
  ui:
    build:
      context: ${CENIT_UI_CONTEXT:-./../ui}
      dockerfile: Dockerfile
    ports:
      - "${UI_PORT:-3002}:80"
    environment:
      - REACT_APP_USE_ENVIRONMENT_CONFIG=true
      - REACT_APP_TIMEOUT_SPAN=300000
      - REACT_APP_APP_ID=admin
      - REACT_APP_LOCALHOST=http://localhost:${UI_PORT:-3002}
      - REACT_APP_CENIT_HOST=http://localhost:${SERVER_PORT:-3000}

  ui_dev:
    image: node:20-alpine
    profiles: ["dev"]
    working_dir: /workspace/ui
    command: sh -c "npm ci --legacy-peer-deps && npm start"
    ports:
      - "${UI_PORT:-3002}:3002"
    volumes:
      - ${CENIT_UI_CONTEXT:-./../ui}:/workspace/ui
      - ui-node-modules:/workspace/ui/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - REACT_APP_APP_ID=admin
      - REACT_APP_LOCALHOST=http://localhost:${UI_PORT:-3002}
      - REACT_APP_CENIT_HOST=http://localhost:${SERVER_PORT:-3000}
    depends_on:
      - server

  server:
    build: .
    ports:
      - "${SERVER_PORT:-3000}:8080"
    environment:
      - MONGODB_URI=mongodb://mongo_server/cenit
      - REDIS_HOST=redis
      - HOMEPAGE=http://localhost:${SERVER_PORT:-3000}
      - CENIT_UI=http://localhost:${UI_PORT:-3002}
      - RABBITMQ_BIGWIG_TX_URL=amqp://cenit_rabbit:cenit_rabbit@rabbitmq/cenit_rabbit_vhost
      - SCHEDULER_LOOKUP_INTERVAL=8
      - UNICORN_WORKERS=4
      - MAXIMUM_UNICORN_CONSUMERS=4
    depends_on:
      - mongo_server
      - redis

  rabbitmq:
    image: rabbitmq:management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_PASS=cenit_rabbit
      - RABBITMQ_DEFAULT_USER=cenit_rabbit
      - RABBITMQ_DEFAULT_VHOST=cenit_rabbit_vhost
    labels:
      NAME: "rabbitmq-server"

  mongo_server:
    image: mongo:7.0
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data-7:/data/db

  redis:
    image: redis:5
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--appendonly", "yes"]
