name: "Checks: Pre-commit (non-e2e)"

on:
  pull_request:
  push:

jobs:
  precommit-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      mongo:
        image: mongo:7.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ ping: 1 })'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
      rabbitmq:
        image: rabbitmq:3.13-management
        ports:
          - 5672:5672
        env:
          RABBITMQ_DEFAULT_USER: cenit_rabbit
          RABBITMQ_DEFAULT_PASS: cenit_rabbit
          RABBITMQ_DEFAULT_VHOST: cenit_rabbit_vhost
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12

    env:
      RAILS_ENV: test
      DB_TEST_HOST: 127.0.0.1:27017
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      RABBITMQ_BIGWIG_TX_URL: amqp://cenit_rabbit:cenit_rabbit@127.0.0.1:5672/cenit_rabbit_vhost

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick libmagickwand-dev

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Run pre-commit checks (excluding e2e)
        run: bundle exec rspec --tag ~api_journey --tag ~api_login --tag ~api_contact_flow
